<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TREASURY ETF PRICER</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  /* Dark terminal aesthetic: sharp edges, monospace, minimal padding. */
  :root {
    --bg: #0a0a0a;
    --fg: #e0e0e0;
    --green: #00ff88;
    --red: #ff4444;
    --amber: #ffaa00;
    --dim: #666;
    --border: #222;
    --panel: #101010;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 13px;
    line-height: 1.5;
  }
  a { color: var(--amber); }
  header {
    border-bottom: 1px solid var(--border);
    padding: 14px 18px;
  }
  header h1 {
    margin: 0;
    color: var(--amber);
    font-size: 18px;
    letter-spacing: 2px;
  }
  header .subtitle { color: var(--dim); font-size: 12px; margin-top: 4px; }
  .wrap { padding: 16px 18px; }
  .row { display: flex; align-items: center; gap: 8px; }
  .spacer { flex: 1; }

  input, button {
    background: #000;
    color: var(--fg);
    border: 1px solid var(--border);
    padding: 7px 10px;
    font-family: inherit;
    font-size: 13px;
    border-radius: 0;
  }
  input { width: 280px; }
  button {
    cursor: pointer;
    color: var(--amber);
    border-color: #333;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  button:hover { background: #1a1a1a; }
  button:disabled { color: var(--dim); cursor: not-allowed; }

  .discover-note { margin-top: 6px; font-size: 12px; min-height: 16px; }
  .err { color: var(--red); }
  .ok { color: var(--green); }
  .dim { color: var(--dim); }
  .amber { color: var(--amber); }

  table { width: 100%; border-collapse: collapse; margin-top: 14px; }
  th, td {
    text-align: right;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  th { color: var(--amber); font-weight: normal; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
  th:first-child, td:first-child, th.l, td.l { text-align: left; }
  tbody tr { cursor: pointer; }
  tbody tr:hover { background: #141414; }
  tbody tr.selected { background: #16160c; }

  .sig-create { color: var(--green); }
  .sig-redeem { color: var(--red); }
  .sig-notrade { color: var(--dim); }
  .pos { color: var(--green); }
  .neg { color: var(--red); }

  .detail { margin-top: 22px; display: none; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
  .card {
    border: 1px solid var(--border);
    background: var(--panel);
    padding: 12px 14px;
  }
  .card h3 {
    margin: 0 0 10px 0;
    color: var(--amber);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }
  .kv { display: flex; justify-content: space-between; padding: 2px 0; }
  .kv span:first-child { color: var(--dim); }
  .badge {
    display: inline-block;
    padding: 8px 14px;
    font-size: 16px;
    letter-spacing: 2px;
    border: 1px solid currentColor;
    margin-top: 8px;
  }
  .detail table { margin-top: 0; }
  .detail td, .detail th { font-size: 12px; }
  canvas { margin-top: 8px; max-height: 240px; }
  .loading { color: var(--amber); }
</style>
</head>
<body>
<header>
  <h1>TREASURY ETF PRICER</h1>
  <div class="subtitle">Fair Value and Arb Signal Tool, priced from the Treasury curve</div>
</header>

<div class="wrap">
  <div class="row">
    <input id="search" placeholder="Search ticker e.g. IEF" autocomplete="off" />
    <button id="addBtn">Add</button>
    <div class="spacer"></div>
    <button id="runAllBtn">Run All</button>
  </div>
  <div id="discoverNote" class="discover-note"></div>

  <table id="watchlist">
    <thead>
      <tr>
        <th class="l">Ticker</th><th class="l">Name</th><th class="l">Signal</th>
        <th>Premium</th><th>NAV</th><th>Track</th><th>Price</th>
        <th>Edge</th><th>Updated</th>
      </tr>
    </thead>
    <tbody id="watchlistBody"></tbody>
  </table>

  <div id="detail" class="detail">
    <div class="row">
      <h2 id="detailTitle" class="amber" style="margin:0;font-size:15px;letter-spacing:1px;"></h2>
      <div class="spacer"></div>
      <button id="refreshBtn">Refresh</button>
    </div>
    <div class="cards" style="margin-top:12px;">
      <div class="card" id="cardSummary"><h3>ETF Summary</h3><div id="summaryBody"></div></div>
      <div class="card" id="cardNav"><h3>NAV and Pricing</h3><div id="navBody"></div></div>
      <div class="card" id="cardCost"><h3>Cost Breakdown</h3><div id="costBody"></div></div>
    </div>
    <div class="card" style="margin-top:12px;">
      <h3>Top 10 Holdings</h3>
      <table>
        <thead><tr>
          <th class="l">Name</th><th class="l">CUSIP</th><th>Coupon</th>
          <th>Maturity</th><th>Clean</th><th>Accrued</th><th>Dirty</th>
        </tr></thead>
        <tbody id="holdingsBody"></tbody>
      </table>
    </div>
    <div class="card" style="margin-top:12px;">
      <h3>Premium History (30d, bps)</h3>
      <canvas id="historyChart"></canvas>
    </div>
  </div>
</div>

<script>
// API base. Empty by default so the dashboard calls the API with same-origin
// relative paths: the page and the API are served by the same FastAPI app on one
// address and port. To point the dashboard at a separately hosted backend (for
// example a Netlify-hosted page calling a remote API), set window.API_BASE to
// that backend's URL before this script runs.
const API_BASE = window.API_BASE || "";

let selectedTicker = null;
let historyChart = null;

function fmt(v, digits = 2) {
  if (v === null || v === undefined || isNaN(v)) return "--";
  return Number(v).toFixed(digits);
}
function fmtUsd(v) {
  if (v === null || v === undefined || isNaN(v)) return "--";
  return "$" + Number(v).toLocaleString(undefined, { maximumFractionDigits: 0 });
}
function signalClass(sig) {
  if (sig === "CREATE") return "sig-create";
  if (sig === "REDEEM") return "sig-redeem";
  return "sig-notrade";
}
function premClass(v) {
  if (v === null || v === undefined) return "dim";
  return v > 0 ? "pos" : (v < 0 ? "neg" : "dim");
}
function trackClass(v) {
  if (v === null || v === undefined) return "dim";
  return Math.abs(v) <= 3 ? "dim" : (v > 0 ? "pos" : "neg");
}
function shortTime(ts) {
  if (!ts) return "--";
  try { return new Date(ts).toISOString().slice(0, 16).replace("T", " "); }
  catch (e) { return ts; }
}

async function api(path, opts) {
  const res = await fetch(API_BASE + path, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.detail || res.statusText);
  return data;
}

// ---- Watchlist table ----
async function loadWatchlist(silent) {
  try {
    const data = await api("/api/watchlist");
    renderWatchlist(data.watchlist);
  } catch (e) {
    if (!silent) setNote("Failed to load watchlist: " + e.message, "err");
  }
}

function renderWatchlist(rows) {
  const body = document.getElementById("watchlistBody");
  body.innerHTML = "";
  rows.forEach((r) => {
    const tr = document.createElement("tr");
    if (r.ticker === selectedTicker) tr.className = "selected";
    tr.innerHTML = `
      <td class="l amber">${r.ticker}</td>
      <td class="l dim">${r.name || ""}</td>
      <td class="l ${signalClass(r.signal)}">${r.signal || "--"}</td>
      <td class="${premClass(r.premium_bps)}">${fmt(r.premium_bps, 1)}</td>
      <td>${fmt(r.nav_per_share, 4)}</td>
      <td class="${trackClass(r.nav_tracking_bps)}">${fmt(r.nav_tracking_bps, 1)}</td>
      <td>${fmt(r.etf_price, 2)}</td>
      <td>${fmtUsd(r.net_edge_usd)}</td>
      <td class="dim">${shortTime(r.last_updated)}</td>`;
    tr.onclick = () => selectTicker(r.ticker);
    body.appendChild(tr);
  });
}

// ---- Detail panel ----
async function selectTicker(ticker) {
  selectedTicker = ticker;
  document.getElementById("detail").style.display = "block";
  document.getElementById("detailTitle").textContent = ticker;
  await loadDetail(ticker);
  loadWatchlist(true);
}

async function loadDetail(ticker) {
  try {
    const d = await api("/api/signals/" + ticker);
    renderDetail(d);
  } catch (e) {
    document.getElementById("summaryBody").innerHTML =
      `<div class="err">${e.message}. Run a repricing first.</div>`;
    document.getElementById("navBody").innerHTML = "";
    document.getElementById("costBody").innerHTML = "";
    document.getElementById("holdingsBody").innerHTML = "";
  }
}

function kv(label, value, cls) {
  return `<div class="kv"><span>${label}</span><span class="${cls || ""}">${value}</span></div>`;
}

function renderDetail(d) {
  const s = d.summary, c = d.costs;
  document.getElementById("summaryBody").innerHTML =
    kv("Ticker", s.ticker, "amber") +
    kv("Name", s.name || "--", "dim") +
    kv("Curve date", s.curve_date || "--") +
    kv("Last updated", shortTime(s.last_updated)) +
    kv("Pricing source", s.source);

  document.getElementById("navBody").innerHTML =
    kv("NAV per share", fmt(s.nav_per_share, 4)) +
    kv("Official NAV", fmt(s.official_nav, 4)) +
    kv("Tracking (bps)", fmt(s.nav_tracking_bps, 1), trackClass(s.nav_tracking_bps)) +
    kv("ETF price", fmt(s.etf_price, 2)) +
    kv("Premium (bps)", fmt(s.premium_bps, 1), premClass(s.premium_bps)) +
    kv("Net edge", fmtUsd(s.net_edge_usd), premClass(s.net_edge_usd)) +
    `<div class="badge ${signalClass(s.signal)}">${s.signal || "--"}</div>`;

  document.getElementById("costBody").innerHTML =
    kv("Creation fee", fmtUsd(c.creation_fee)) +
    kv("Bond half-spread", fmtUsd(c.bond_spread_cost)) +
    kv("Breakeven (bps)", fmt(c.breakeven_bps, 2), "amber");

  const hb = document.getElementById("holdingsBody");
  hb.innerHTML = "";
  (d.top_holdings || []).forEach((h) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="l dim">${h.name || ""}</td>
      <td class="l">${h.cusip || ""}</td>
      <td>${h.coupon != null ? fmt(h.coupon * 100, 3) : "--"}</td>
      <td>${h.maturity || "--"}</td>
      <td>${fmt(h.clean_mid, 4)}</td>
      <td>${fmt(h.accrued_interest, 4)}</td>
      <td>${fmt(h.dirty_mid, 4)}</td>`;
    hb.appendChild(tr);
  });

  renderHistory(d.history || []);
}

function renderHistory(history) {
  const ctx = document.getElementById("historyChart");
  const labels = history.map((h) => h.curve_date);
  const values = history.map((h) => h.premium_bps);
  if (historyChart) historyChart.destroy();
  historyChart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        data: values,
        borderColor: "#00ff88",
        backgroundColor: "transparent",
        fill: false,
        pointRadius: 2,
        tension: 0.1,
      }],
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: "#666" }, grid: { color: "#1a1a1a" } },
        y: { ticks: { color: "#666" }, grid: { color: "#1a1a1a" } },
      },
    },
  });
}

// ---- Search + discover (500ms debounce) ----
let debounceTimer = null;
function setNote(msg, cls) {
  const el = document.getElementById("discoverNote");
  el.textContent = msg;
  el.className = "discover-note " + (cls || "");
}

document.getElementById("search").addEventListener("input", (e) => {
  const ticker = e.target.value.trim().toUpperCase();
  clearTimeout(debounceTimer);
  if (!ticker) { setNote(""); return; }
  debounceTimer = setTimeout(async () => {
    try {
      const d = await api("/api/discover?ticker=" + encodeURIComponent(ticker));
      setNote(`${d.name} | ${d.category} (${d.provider})`, "ok");
    } catch (err) {
      setNote(err.message, "err");
    }
  }, 500);
});

document.getElementById("addBtn").onclick = async () => {
  const ticker = document.getElementById("search").value.trim().toUpperCase();
  if (!ticker) return;
  setNote("Adding " + ticker + "...", "dim");
  try {
    const d = await api("/api/watchlist/add", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ticker }),
    });
    setNote(`Added ${d.ticker}: ${d.holdings} Treasury holdings`, "ok");
    loadWatchlist();
  } catch (err) {
    setNote(err.message, "err");
  }
};

document.getElementById("runAllBtn").onclick = async (e) => {
  e.target.disabled = true;
  e.target.textContent = "Running...";
  try {
    await api("/api/run-all", { method: "POST" });
    await loadWatchlist();
    if (selectedTicker) await loadDetail(selectedTicker);
  } catch (err) {
    setNote(err.message, "err");
  } finally {
    e.target.disabled = false;
    e.target.textContent = "Run All";
  }
};

document.getElementById("refreshBtn").onclick = async (e) => {
  if (!selectedTicker) return;
  e.target.disabled = true;
  e.target.textContent = "Refreshing...";
  try {
    await api("/api/run?ticker=" + encodeURIComponent(selectedTicker), { method: "POST" });
    await loadDetail(selectedTicker);
    await loadWatchlist(true);
  } catch (err) {
    setNote(err.message, "err");
  } finally {
    e.target.disabled = false;
    e.target.textContent = "Refresh";
  }
};

// ---- Boot + 60s silent auto-refresh ----
loadWatchlist();
setInterval(() => loadWatchlist(true), 60000);
</script>
</body>
</html>
